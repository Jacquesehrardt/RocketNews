<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="./Assets/icon.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Spartan:wght@400;700&family=Work+Sans:wght@700&display=swap" rel="stylesheet">
    <title>RocketNews</title>
</head>
<body>
    <header>
        <a href="otario.html">
            <img src="./Assets/logo.svg" title="RocketNews" alt="Logo RocketNews" class="logo">
        </a>
    </header>
    <main>
        <div class="info">
            <h1>atualize ideias e informações em 5 minutos.</h1>
            <h2>tudo que você precisa saber para começar seu dia bem e informado</h2>
            <p class="text">noticias sobre o universo Rocketseat, e tudo o que precisa para começar o dia melhor.
                perfeito para se preparar para codar ☕</p>
        </div>
        <label for="email">Insira seu Email</label>
        <form>
            <div class="rectangle"></div>
            <input type="email" name="email" id="email" placeholder="oi@rocketseat.com">
            <button>
                <img src="./Assets/send.svg" alt="enviar" class="send">
            </button>
        </form>
        <a href="otario.html" class="link">
            <p>deixe-me ler primeiro</p>
            <img src="./Assets/arrow-right.svg" alt="seta para direita" class="arrow">
        </a>
    </main>
    <img src="./Assets/read_news.jpg" alt="foto" class="readNews">
